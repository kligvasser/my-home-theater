<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}my-home-theater{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">🎬 my-home-theater</a>
    <nav>
      <a href="/" class="{{ 'active' if active == 'dashboard' }}">Dashboard</a>
      <a href="/library" class="{{ 'active' if active == 'library' }}">Library</a>
      <a href="/candidates" class="{{ 'active' if active == 'candidates' }}">Candidates</a>
      <a href="/subtitles" class="{{ 'active' if active == 'subtitles' }}">Subtitles</a>
      <a href="/insights" class="{{ 'active' if active == 'insights' }}">Insights</a>
      <a href="/settings" class="{{ 'active' if active == 'settings' }}">Settings</a>
      <a href="/runs" class="{{ 'active' if active == 'runs' }}">Runs</a>
      <a href="/status" class="{{ 'active' if active == 'status' }}">Status</a>
    </nav>
    <button id="lock" class="lockbtn" data-action="lock" type="button">🔒</button>
  </header>
  <div id="flash" class="flash" hidden></div>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">dashboard · v{{ version }}</footer>
  <script src="/static/app.js" defer></script>
</body>
</html>
