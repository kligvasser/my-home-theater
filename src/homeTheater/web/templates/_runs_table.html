{% if runs %}
<table class="runs">
  <thead><tr><th>Job</th><th>Status</th><th>Started</th><th>Finished</th><th>Stats</th></tr></thead>
  <tbody>
  {% for r in runs %}
    <tr>
      <td>{{ r.kind }}</td>
      <td><span class="pill {{ r.status }}">{{ r.status }}</span></td>
      <td class="mono">{{ r.started_at or "—" }}</td>
      <td class="mono">{{ r.finished_at or "—" }}</td>
      <td class="mono small">{{ r.stats | tojson if r.stats else "—" }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% else %}
<p class="muted">No runs recorded yet. Try <code>home-theater scan</code>.</p>
{% endif %}
