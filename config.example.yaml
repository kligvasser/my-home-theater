# my-home-theater — non-secret configuration.
# Copy to `config.yaml` and edit. Secrets go in `.env` (see .env.example).

nas:
  # SMB share name (used if the roots below are relative to the share).
  share: Elements_25A1-1
  movies_root: Movies
  tv_root: TV Shows

thresholds:
  # Global bars; movies and series can override below (series accumulate far
  # fewer IMDb votes than films, so their vote bar defaults lower).
  min_imdb_rating: 7.0      # "high rank"
  min_imdb_votes: 25000     # "enough views"
  min_tmdb_votes: 500
  tmdb_fallback: true       # judge on TMDb rating/votes when IMDb data is missing
  movie: {}                 # e.g. { min_imdb_rating: 6.8 }
  series:
    min_imdb_votes: 5000
    min_tmdb_votes: 200
  allowed_resolutions:
    - 1080p
    - 2160p

features:
  dry_run: true             # keep true until acquisition/import are validated
  auto_approve: false       # false = review candidates in the dashboard first

schedule:
  enabled: false        # true = `home-theater` (serve) runs jobs on intervals
  scan_interval_minutes: 360
  discovery_interval_minutes: 720
  subtitle_interval_minutes: 720
  sync_interval_minutes: 10
  acquire_interval_minutes: 30            # queue approved candidates to the arrs
  import_reconcile_interval_minutes: 60   # 0 disables a job
  backup_interval_minutes: 1440           # daily SQLite backup

database:
  url: sqlite:///data/home_theater.db
  echo: false

metadata:
  language: en-US       # TMDb language for details
  cache_days: 14        # TTL for cached TMDb/OMDb responses (respects rate limits)
  max_concurrency: 8    # parallel provider fetches during enrichment

discovery:
  trending: true        # pull TMDb trending
  top_rated: false      # also pull TMDb top-rated
  watchlist: true       # Trakt watchlist (needs keys + `home-theater trakt-auth`)
  include_movies: true
  include_series: true
  trending_window: week # day | week
  max_per_source: 20    # cap items per source before filtering
  excluded_genres: []   # e.g. [Documentary, Reality]

subtitles:
  languages: [he, en]   # target languages
  max_searches_per_sweep: 50  # cap searches/downloads per sweep (provider quotas)
  # backend: bazarr (trigger Bazarr) | native (fetch providers ourselves, no arr stack)
  backend: bazarr
  # --- native backend only ---
  # best-first (first hit wins): ktuvit (Hebrew), opensubtitles_org (legacy
  # XML-RPC, uncapped English), opensubtitles (.com REST, he+en, 20 dl/day cap)
  sources: [opensubtitles]
  # opensubtitles.org XML-RPC needs a registered user agent (temporary one is throttled)
  opensubtitles_org_user_agent: "TemporaryUserAgent"
  # Where owned media is reachable locally so subs can be written beside it.
  # null -> derive the NAS path over SMB (unreliable on some NAS); prefer a mount.
  library_base_dir: null
  hearing_impaired: false
  opensubtitles_user_agent: "my-home-theater v1"

# Library folder structure, pushed to Radarr/Sonarr/Bazarr with
# `home-theater apply-naming` (or the Settings-page button):
#   Movies/<Title (Year)>/<file>        + <Title (Year)>/Subs/
#   TV Shows/<Series>/Season 01/<eps>   + Season 01/Subs/
organizer:
  movie_folder_format: "{Movie Title} ({Release Year})"
  movie_file_format: "{Movie Title} ({Release Year}) {Quality Full}"
  series_folder_format: "{Series Title}"
  season_folder_format: "Season {season:00}"
  episode_file_format: "{Series Title} - S{season:00}E{episode:00} - {Episode Title}"
  subs_folder: Subs

taste:
  enabled: true         # content-similarity vs your owned library (no labels needed)
  min_library: 8        # min enriched owned titles per kind before scoring
  neighbors: 5          # kNN size for the similarity score
  weight: 0.5           # discovery score blend: + weight*10*similarity
  max_clusters: 8       # upper bound for the /insights clustering
  model_weight: 0.5     # blend for the trained classifier: + weight*10*p(like)

acquisition:
  # backend: how approved candidates are grabbed.
  #   arr     -> hand the title to Radarr/Sonarr (they own indexers + download).
  #   torrent -> search indexers ourselves and push the magnet to Transmission
  #              (see the `torrent:` block; no arr stack required).
  backend: arr
  # --- arr backend settings (ignored when backend: torrent) ---
  # Quality profile NAMES as configured inside Radarr/Sonarr (release selection).
  movie_quality_profile: HD-1080p
  series_quality_profile: HD-1080p
  # Root folders; leave null to use the arr's first configured root folder.
  movie_root_folder: null
  series_root_folder: null
  search_on_add: true   # tell Radarr/Sonarr to search immediately after adding
  # Nightly window for the SCHEDULED acquire job (also editable on the Settings
  # page). "Grab approved now" (Activity page) always bypasses it. Local hours,
  # wraps past midnight (e.g. 22→6). enabled: false = grab every acquire cycle.
  window:
    enabled: false
    start_hour: 2
    end_hour: 6

# Native torrent backend — used only when acquisition.backend: torrent.
# You are responsible for your sources and their legality; keep features.dry_run
# on until you've watched one clean grab-to-import cycle.
torrent:
  enabled_sources:        # piratebay (apibay JSON API, reliable) | 1337x | rarbg
    - piratebay
  min_seeders: 5          # drop releases below this many seeders
  resolutions: null       # null -> reuse thresholds.allowed_resolutions
  max_results_per_source: 30
  # Download target dir. On macOS DO NOT use ~/Downloads, ~/Desktop or ~/Documents:
  # privacy protection (TCC) blocks this app from reading them, so imports fail with
  # "permission denied". Use a plain folder like /Users/<you>/HomeTheaterDownloads.
  movie_download_dir: null    # null -> Transmission's own default download dir
  series_download_dir: null
  # Optional FlareSolverr proxy (http://host:8191) so Cloudflare-walled sources
  # (1337x) work. Leave null and those sources are skipped on a challenge.
  flaresolverr_url: null
  # Mirror base URLs — these sites move domains often; swap here, no code change.
  piratebay_api_url: https://apibay.org
  x1337_base_url: https://1337x.st
  rarbg_base_url: https://en.rarbg-official.is
  request_timeout: 20.0
  stale_after_hours: 6    # no progress for this long -> mark the download failed
  # --- library import (runs after a torrent completes) ---
  import_to_library: true      # copy finished MOVIES into Movies/<Title (Year)>/
  library_base_dir: null       # null -> write to the NAS over SMB (nas.* + SMB_*);
                               # set a local/mounted path to copy there instead
  delete_local_after_import: false  # true -> remove torrent+local files after
                                    # import (a real "move"); false keeps seeding

# Free-form list of provider names you've enabled (metadata/library/subtitle).
enabled_providers:
  - tmdb
  - omdb
  - radarr
  - sonarr
  - bazarr
